<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insect | Classification</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<!--- Animation by Animate on Scroll Library --->
<body>
    <nav class="navbar fixed-top shadow-sm">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">
            <div class="logo">
                <img src="/static/assets/app-name.jpg" height="100">
            </div>
        </a>
          <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar" aria-labelledby="offcanvasNavbarLabel">
            <div class="offcanvas-header">
                <div class="logo">
                    <img src="/static/assets/app-name.jpg" height="100">
                </div>
              <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
            </div>
            <div class="offcanvas-body">
              <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
                <li class="nav-item">
                  <a class="nav-link" aria-current="page" href="/">Home</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link active" href="/predict">Predict</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="#">About</a>
                </li>
            </div>
          </div>
        </div>
    </nav>
    <div class="container">
      <div class="row">
        <div class="col d-flex justify-content-center mt-5 mb-5">
            <div class="card border-2" style="width: 25rem;">
                <img src="/static/assets/insect/insect-{{ number }}.jpg" class="card-img-top" alt="...">
                <div class="card-body border-bottom">
                  <h5 class="card-title">Name</h5>
                  <p class="card-text fs-5 fw-bold">{{ prediction }}</p>
                </div>
                <div class="card-body border-bottom">
                    <h5 class="card-title">Crop Affected</h5>
                    <p class="card-text">{{ detail.crops_affected }}</p>
                </div>
                <div class="card-body border-bottom">
                    <h5 class="card-title">Impact</h5>
                  <p class="card-text text-justify">{{ detail.impact }}</p>
                </div>
                <div class="card-body">
                    <h5 class="card-title">Control Method</h5>
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item">{{ detail.control_methods[0] }}</li>
                        <li class="list-group-item">{{ detail.control_methods[1] }}</li>
                        <li class="list-group-item">{{ detail.control_methods[2] }}</li>
                    </ul>
                </div>
                <div class="card-footer text-center">
                    <a href="/predict">Predict Again</a>
                </div>                
              </div>
        </div>
    </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
        const fileup=document.getElementById("formFileLg");
        const gallary=document.getElementById("gallary");
        fileup.addEventListener("change",(e)=>{
          const [file]=fileup.files;
          if(file){
            gallary.src=URL.createObjectURL(file);
          }
        })
        async function previewFile(file) {
          let reader = new FileReader()
          reader.readAsDataURL(file)
  
            let img = document.createElement('img')
            img.src = reader.result
            document.getElementById('gallery').appendChild(img);
        }
    </script>
</body>
</html>
